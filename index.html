<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#ffffff"/>
<title>旅人譯 · Wanderlate</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
html,body{margin:0;padding:0;overscroll-behavior:none}
#root{min-height:100vh;min-height:100dvh}
input,textarea,button{font-family:inherit}
@keyframes wl-spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes wl-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes wl-ping{0%{transform:scale(.95);opacity:.55}80%,100%{transform:scale(1.5);opacity:0}}
@keyframes wl-slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes wl-fade-in{from{opacity:0}to{opacity:1}}
@keyframes wl-fade-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;color:#999;font-size:14px;">載入中…（約 3-5 秒）</div></div>
<script type="text/babel" data-presets="react">
const {useState,useRef,useEffect}=React;
const FONT="'Geist',-apple-system,BlinkMacSystemFont,'PingFang TC','PingFang SC','Microsoft JhengHei',sans-serif";
const C={bg:"#fff",card:"#F5F5F7",primary:"#1A1A1A",secondary:"#8E8E93",tertiary:"#C7C7CC",accent:"#7C5CFF",soft:"#F0EAFF",border:"rgba(0,0,0,0.08)"};
const spin={animation:"wl-spin 1s linear infinite"};

const LANGS=[
  {code:"zh-TW",name:"Chinese",   native:"繁體中文",  voice:"zh-TW",flag:"🇹🇼"},
  {code:"zh-CN",name:"Chinese",   native:"简体中文",  voice:"zh-CN",flag:"🇨🇳"},
  {code:"en",   name:"English",   native:"English",  voice:"en-US",flag:"🇺🇸"},
  {code:"ja",   name:"Japanese",  native:"日本語",    voice:"ja-JP",flag:"🇯🇵"},
  {code:"ko",   name:"Korean",    native:"한국어",    voice:"ko-KR",flag:"🇰🇷"},
  {code:"es",   name:"Spanish",   native:"Español",  voice:"es-ES",flag:"🇪🇸"},
  {code:"fr",   name:"French",    native:"Français", voice:"fr-FR",flag:"🇫🇷"},
  {code:"de",   name:"German",    native:"Deutsch",  voice:"de-DE",flag:"🇩🇪"},
  {code:"it",   name:"Italian",   native:"Italiano", voice:"it-IT",flag:"🇮🇹"},
  {code:"pt",   name:"Portuguese",native:"Português",voice:"pt-PT",flag:"🇵🇹"},
  {code:"th",   name:"Thai",      native:"ภาษาไทย", voice:"th-TH",flag:"🇹🇭"},
  {code:"vi",   name:"Vietnamese",native:"Tiếng Việt",voice:"vi-VN",flag:"🇻🇳"},
  {code:"id",   name:"Indonesian",native:"Bahasa Indonesia",voice:"id-ID",flag:"🇮🇩"},
  {code:"tr",   name:"Turkish",   native:"Türkçe",   voice:"tr-TR",flag:"🇹🇷"},
  {code:"ru",   name:"Russian",   native:"Русский",  voice:"ru-RU",flag:"🇷🇺"},
  {code:"ar",   name:"Arabic",    native:"العربية",  voice:"ar-SA",flag:"🇸🇦"},
];

const PHRASES=["請問洗手間在哪裡？","這個多少錢？","請推薦招牌菜","可以刷信用卡嗎？","請幫我叫計程車","我對花生過敏","請說慢一點","我聽不太懂","請給我菜單","謝謝你的幫忙"];

const Svg=({children,size=16,strokeWidth=2,fill="none",...r})=>
  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
    fill={fill} stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" {...r}>{children}</svg>;
const Mic=(p)=><Svg {...p}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></Svg>;
const Square=(p)=><Svg {...p}><rect width="18" height="18" x="3" y="3" rx="2"/></Svg>;
const Type=(p)=><Svg {...p}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></Svg>;
const ImgIcon=(p)=><Svg {...p}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></Svg>;
const Bookmark=(p)=><Svg {...p}><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></Svg>;
const Copy=(p)=><Svg {...p}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></Svg>;
const Vol2=(p)=><Svg {...p}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></Svg>;
const LR=(p)=><Svg {...p}><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></Svg>;
const Spin=(p)=><Svg {...p}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Svg>;
const X=(p)=><Svg {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Svg>;
const Check=(p)=><Svg {...p}><path d="M20 6 9 17l-5-5"/></Svg>;
const Cam=(p)=><Svg {...p}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></Svg>;
const Upload=(p)=><Svg {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></Svg>;
const Down=(p)=><Svg {...p}><path d="m6 9 6 6 6-6"/></Svg>;
const Globe=(p)=><Svg {...p}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></Svg>;
const Lang=(p)=><Svg {...p}><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></Svg>;
const Sparkle=(p)=><Svg {...p}><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></Svg>;

async function myMemoryTranslate(text,from,to){
  if(!text.trim())return"";
  const url=new URL("https://api.mymemory.translated.net/get");
  url.searchParams.set("q",text.slice(0,500));
  url.searchParams.set("langpair",`${from}|${to}`);
  const r=await fetch(url.toString());
  const d=await r.json();
  if(d.responseStatus!==200&&String(d.responseStatus)!=="200")throw new Error(d.responseDetails||"翻譯失敗");
  const tmp=document.createElement("textarea");
  tmp.innerHTML=d.responseData.translatedText;
  return tmp.value;
}

function App(){
  const [src,setSrc]=useState("zh-TW");
  const [tgt,setTgt]=useState("ja");
  const [input,setInput]=useState("");
  const [output,setOutput]=useState("");
  const [detected,setDetected]=useState("");
  const [mode,setMode]=useState("text");
  const [loading,setLoading]=useState(false);
  const [imgSrc,setImgSrc]=useState(null);
  const [copied,setCopied]=useState(false);
  const [err,setErr]=useState("");
  const [showSrc,setShowSrc]=useState(false);
  const [showTgt,setShowTgt]=useState(false);
  const [rec,setRec]=useState(false);
  const recRef=useRef(null);
  const recOn=useRef(false);
  const tTimer=useRef(null);
  const lastTxt=useRef("");
  const tReq=useRef(0);
  const voicesRef=useRef([]);
  const fileRef=useRef(null);
  const camRef=useRef(null);

  useEffect(()=>{
    if(!window.speechSynthesis)return;
    const load=()=>{const v=window.speechSynthesis.getVoices();if(v.length)voicesRef.current=v;};
    load();window.speechSynthesis.addEventListener?.("voiceschanged",load);
    return()=>{try{window.speechSynthesis.removeEventListener?.("voiceschanged",load);}catch{}};
  },[]);

  useEffect(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR)return;
    const r=new SR();r.continuous=true;r.interimResults=true;
    r.lang=LANGS.find(l=>l.code===src)?.voice||"en-US";
    r.onresult=e=>{
      let fin="",mid="";
      for(let i=0;i<e.results.length;i++){if(e.results[i].isFinal)fin+=e.results[i][0].transcript;else mid+=e.results[i][0].transcript;}
      const txt=(fin+mid).trim();setInput(txt);
      clearTimeout(tTimer.current);
      tTimer.current=setTimeout(()=>{if(txt&&txt!==lastTxt.current){lastTxt.current=txt;doTranslate(txt);}},700);
    };
    r.onerror=e=>{
      if(e.error==="no-speech"||e.error==="aborted")return;
      setErr(e.error==="not-allowed"?"麥克風被拒絕 — 請在 https:// 環境使用":`語音辨識：${e.error}`);
      recOn.current=false;setRec(false);
    };
    r.onend=()=>{if(recOn.current){try{r.start();}catch{}}else setRec(false);};
    recRef.current=r;
    return()=>{try{r.abort();}catch{}};
  },[src]);

  const doTranslate=async(override)=>{
    const text=(override??input).trim();if(!text)return;
    const id=++tReq.current;setLoading(true);setErr("");
    try{
      const result=await myMemoryTranslate(text,src,tgt);
      if(id!==tReq.current)return;setOutput(result);
    }catch(e){if(id===tReq.current)setErr(`翻譯失敗：${e.message}`);}
    if(id===tReq.current)setLoading(false);
  };

  const swap=()=>{
    setSrc(tgt);setTgt(src);
    if(output){setInput(output);setOutput(input);}
  };

  const startRec=()=>{
    if(!recRef.current){setErr("此瀏覽器不支援語音輸入（試試 Chrome）");return;}
    setErr("");setInput("");setOutput("");setDetected("");setImgSrc(null);
    lastTxt.current="";recOn.current=true;setRec(true);
    try{recRef.current.lang=LANGS.find(l=>l.code===src)?.voice||"en-US";recRef.current.start();}
    catch{try{recRef.current.abort();setTimeout(()=>{try{recRef.current.start();}catch{}},120);}catch{}}
  };
  const stopRec=()=>{
    recOn.current=false;setRec(false);clearTimeout(tTimer.current);
    try{recRef.current?.stop();}catch{}
    if(input.trim()&&input!==lastTxt.current){lastTxt.current=input;doTranslate(input);}
  };

  const speak=(text,lc)=>{
    if(!text||!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const lobj=LANGS.find(l=>l.code===lc);const tv=lobj?.voice||"en-US";
    const all=voicesRef.current.length?voicesRef.current:window.speechSynthesis.getVoices();
    const mv=all.find(v=>v.lang===tv)||all.find(v=>v.lang.startsWith(lc));
    const u=new SpeechSynthesisUtterance(text);u.lang=mv?.lang||tv;if(mv)u.voice=mv;u.rate=0.9;
    setTimeout(()=>{try{window.speechSynthesis.speak(u);}catch{}},60);
  };

  const doCopy=t=>{if(!t)return;navigator.clipboard.writeText(t);setCopied(true);setTimeout(()=>setCopied(false),1500);};
  const clearAll=()=>{setInput("");setOutput("");setDetected("");setImgSrc(null);setErr("");};

  const handleImg=file=>{
    if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{setImgSrc(ev.target.result);setErr("❗ 圖片辨識需要 Claude API。請在上面的 Claude 介面中使用圖片翻譯功能。");setLoading(false);};
    r.readAsDataURL(file);
  };

  const SL=LANGS.find(l=>l.code===src);
  const TL=LANGS.find(l=>l.code===tgt);

  const Sheet=({show,onClose,subtitle,activeCode,onPick,filter})=>{
    if(!show)return null;
    return<>
      <div onClick={onClose} className="fixed inset-0"
        style={{backgroundColor:"rgba(0,0,0,.4)",backdropFilter:"blur(8px)",zIndex:9998,animation:"wl-fade-in .2s ease-out"}}/>
      <div className="fixed bottom-0 left-0 right-0 rounded-t-3xl flex flex-col"
        style={{backgroundColor:C.bg,maxHeight:"75vh",zIndex:9999,boxShadow:"0 -20px 60px rgba(0,0,0,.2)",
          animation:"wl-slide-up .3s cubic-bezier(.2,.9,.3,1)",fontFamily:FONT}}>
        <div className="flex justify-center pt-3 pb-1"><div className="w-10 h-1 rounded-full" style={{backgroundColor:C.tertiary,opacity:.5}}/></div>
        <div className="flex items-center justify-between px-5 pt-2 pb-3">
          <div>
            <div className="text-[10px] uppercase tracking-wider" style={{color:C.secondary,fontWeight:600}}>{subtitle}</div>
            <div style={{fontSize:20,fontWeight:600,marginTop:2}}>選擇語言</div>
          </div>
          <button onClick={onClose} className="w-9 h-9 rounded-full flex items-center justify-center"
            style={{backgroundColor:C.card,color:C.secondary}}><X size={16}/></button>
        </div>
        <div className="overflow-y-auto px-3 pb-8">
          {LANGS.filter(filter||Boolean).map(lang=>{
            const active=activeCode===lang.code;
            return<button key={lang.code} onClick={()=>{onPick(lang.code);onClose();}}
              className="w-full text-left px-3 py-3 rounded-2xl flex items-center gap-3"
              style={{backgroundColor:active?C.soft:"transparent"}}>
              <span style={{fontSize:22}}>{lang.flag}</span>
              <span className="flex-1" style={{fontSize:16,fontWeight:500,color:C.primary}}>{lang.native}</span>
              <span style={{fontSize:12,color:C.secondary}}>{lang.name}</span>
              {active&&<Check size={16} style={{color:C.accent}}/>}
            </button>;
          })}
        </div>
      </div>
    </>;
  };

  const ResultCard=({compact=false})=>{
    if(!output&&!loading)return null;
    return<div className={`rounded-3xl ${compact?"px-4 py-3":"p-5"}`}
      style={{backgroundColor:C.soft,animation:"wl-fade-up .25s ease-out"}}>
      <div className="text-[10px] uppercase tracking-wider mb-1 flex items-center gap-2"
        style={{color:C.accent,fontWeight:600}}>
        {TL?.native}
        {loading&&<Spin size={11} style={spin}/>}
      </div>
      {output&&<>
        <div style={{fontSize:compact?17:20,lineHeight:1.5,color:C.primary,fontWeight:500,whiteSpace:"pre-wrap"}}>{output}</div>
        <div className="flex gap-2 mt-3">
          <button onClick={()=>speak(output,tgt)}
            className="px-3 py-1.5 rounded-full flex items-center gap-1.5 active:scale-95"
            style={{backgroundColor:"rgba(124,92,255,.15)",color:C.accent,fontSize:12,fontWeight:600}}>
            <Vol2 size={13}/> 朗讀
          </button>
          <button onClick={()=>doCopy(output)}
            className="px-3 py-1.5 rounded-full flex items-center gap-1.5 active:scale-95"
            style={{backgroundColor:"rgba(124,92,255,.15)",color:C.accent,fontSize:12,fontWeight:600}}>
            {copied?<Check size={13}/>:<Copy size={13}/>} {copied?"已複製":"複製"}
          </button>
        </div>
      </>}
    </div>;
  };

  return<>
    <div className="min-h-screen flex flex-col"
      style={{backgroundColor:C.bg,color:C.primary,fontFamily:FONT,minHeight:"100dvh"}}>

      <header className="px-5 pt-4 pb-3 flex items-center gap-2.5 shrink-0">
        <div className="w-8 h-8 rounded-full flex items-center justify-center"
          style={{background:"linear-gradient(135deg,#FFD6E8,#E8DAFF,#C5E0FF)"}}>
          <span style={{fontSize:12}}>🌏</span>
        </div>
        <div>
          <div style={{fontSize:14,fontWeight:600,lineHeight:1.2}}>旅人譯</div>
          <div style={{fontSize:10,color:C.secondary,marginTop:1}}>Wanderlate</div>
        </div>
      </header>

      <main className="flex-1 flex flex-col px-5 pb-4 overflow-y-auto" style={{scrollbarWidth:"none"}}>

        {mode==="voice"&&<div className="flex-1 flex flex-col items-center justify-center" style={{animation:"wl-fade-up .25s ease-out",minHeight:380}}>
          <button onClick={rec?stopRec:startRec} className="relative active:scale-95 transition-transform"
            style={{width:200,height:200,padding:0,border:"none",background:"transparent",cursor:"pointer",borderRadius:"50%"}}>
            <div className="absolute inset-0 rounded-full pointer-events-none"
              style={{background:"conic-gradient(from 0deg,#B5E48C,#FFD6E8,#E8DAFF,#C5E0FF,#FFE8C7,#FFB5C5,#B5E48C)",
                animation:`wl-spin ${rec?"4s":"14s"} linear infinite`}}/>
            {rec&&<span className="absolute inset-1 rounded-full pointer-events-none"
              style={{background:"rgba(124,92,255,.18)",animation:"wl-ping 1.6s ease-out infinite"}}/>}
            <div className="absolute rounded-full flex items-center justify-center pointer-events-none"
              style={{inset:4,background:rec?"radial-gradient(circle at 35% 30%,#FFC8DC,#DCC8FF 50%,#C8C8FF)":"radial-gradient(circle at 35% 30%,#FFF0F5,#F5EBFF 60%,#EBF0FF)",
                boxShadow:"inset 0 -10px 30px rgba(220,200,240,.45)",animation:rec?"wl-pulse 1.4s ease-in-out infinite":"none"}}>
              {rec?<Square size={32} fill="#7C5CFF" style={{color:"#7C5CFF"}} strokeWidth={0}/>
                  :<Mic size={42} strokeWidth={1.6} style={{color:"#9B7EE0"}}/>}
            </div>
          </button>
          <div className="mt-7 text-center px-4" style={{fontSize:14,color:C.secondary,lineHeight:1.5}}>
            {rec?"聆聽中，再點一下停止":"點一下開始錄音，邊說邊翻譯"}
          </div>
          {(input||output||loading)&&<div className="w-full mt-6 space-y-3" style={{animation:"wl-fade-up .25s ease-out"}}>
            {input&&<div className="px-4 py-3 rounded-2xl" style={{backgroundColor:C.card,fontSize:15,lineHeight:1.5}}>
              <div className="text-[10px] uppercase tracking-wider mb-1" style={{color:C.secondary,fontWeight:600}}>{SL?.native}</div>
              {input}
            </div>}
            <ResultCard compact/>
          </div>}
        </div>}

        {mode==="text"&&<div className="w-full flex flex-col gap-3 pt-2" style={{animation:"wl-fade-up .25s ease-out"}}>
          <div className="rounded-3xl p-5" style={{backgroundColor:C.card,minHeight:180}}>
            <div className="text-[10px] uppercase tracking-wider mb-2" style={{color:C.secondary,fontWeight:600}}>{SL?.native}</div>
            <textarea value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&(e.metaKey||e.ctrlKey))doTranslate();}}
              placeholder="輸入要翻譯的文字…" rows={5}
              className="w-full bg-transparent resize-none outline-none placeholder:opacity-40"
              style={{fontSize:17,lineHeight:1.5,color:C.primary,fontFamily:FONT}}/>
            <div className="flex items-center justify-between mt-3 pt-3" style={{borderTop:`1px solid ${C.border}`}}>
              <div style={{fontSize:11,color:C.tertiary}}>{input.length}/500 字 · ⌘+Enter</div>
              <button onClick={()=>doTranslate()} disabled={!input.trim()||loading}
                className="px-4 py-2 rounded-full flex items-center gap-1.5 active:scale-95 disabled:opacity-40"
                style={{backgroundColor:C.accent,color:"white",fontSize:13,fontWeight:600}}>
                {loading?<Spin size={13} style={spin}/>:<Sparkle size={13}/>} 翻譯
              </button>
            </div>
          </div>
          <ResultCard/>
        </div>}

        {mode==="image"&&<div className="w-full flex flex-col gap-3 pt-2" style={{animation:"wl-fade-up .25s ease-out"}}>
          {!imgSrc?<div className="grid grid-cols-2 gap-3 pt-4">
            <button onClick={()=>camRef.current?.click()}
              className="aspect-square rounded-3xl flex flex-col items-center justify-center gap-3 active:scale-[0.98]"
              style={{background:"linear-gradient(135deg,#FFE8F0,#F0E8FF)",color:C.accent}}>
              <Cam size={34} strokeWidth={1.6}/><div style={{fontSize:14,fontWeight:600}}>拍照翻譯</div>
            </button>
            <button onClick={()=>fileRef.current?.click()}
              className="aspect-square rounded-3xl flex flex-col items-center justify-center gap-3 active:scale-[0.98]"
              style={{background:"linear-gradient(135deg,#E8F0FF,#F0E8FF)",color:C.accent}}>
              <Upload size={34} strokeWidth={1.6}/><div style={{fontSize:14,fontWeight:600}}>從相簿選擇</div>
            </button>
          </div>:<>
            <div className="relative rounded-3xl overflow-hidden" style={{backgroundColor:C.card}}>
              <img src={imgSrc} alt="" className="w-full" style={{maxHeight:220,objectFit:"contain"}}/>
              <button onClick={clearAll} className="absolute top-3 right-3 w-8 h-8 rounded-full flex items-center justify-center"
                style={{backgroundColor:"rgba(0,0,0,.55)",color:"white"}}>
                <X size={14}/>
              </button>
            </div>
          </>}
          <input ref={camRef} type="file" accept="image/*" capture="environment" className="hidden"
            onChange={e=>handleImg(e.target.files?.[0])}/>
          <input ref={fileRef} type="file" accept="image/*" className="hidden"
            onChange={e=>handleImg(e.target.files?.[0])}/>
        </div>}

        {mode==="phrases"&&<div className="w-full pt-2" style={{animation:"wl-fade-up .25s ease-out"}}>
          <div className="text-[10px] uppercase tracking-wider mb-3 px-1" style={{color:C.secondary,fontWeight:600}}>
            常用短句 · 點一下翻譯到 {TL?.native}
          </div>
          <div className="space-y-2">
            {PHRASES.map(p=><button key={p} onClick={()=>{setMode("text");setInput(p);doTranslate(p);}}
              className="w-full text-left px-4 py-3.5 rounded-2xl flex items-center justify-between active:scale-[0.99]"
              style={{backgroundColor:C.card}}>
              <span style={{fontSize:15,fontWeight:500}}>{p}</span>
              <LR size={14} style={{color:C.tertiary}}/>
            </button>)}
          </div>
        </div>}
      </main>

      {err&&<div className="mx-5 mb-2 px-4 py-3 rounded-2xl flex items-start gap-2"
        style={{backgroundColor:"#FFE8E8",color:"#D63031",animation:"wl-fade-up .25s ease-out"}}>
        <div className="flex-1" style={{fontSize:13,lineHeight:1.45}}>{err}</div>
        <button onClick={()=>setErr("")}><X size={14}/></button>
      </div>}

      <div className="px-5 py-2 flex items-center gap-2 shrink-0">
        <button onClick={()=>{setShowSrc(true);setShowTgt(false);}}
          className="flex-1 px-3 py-2.5 rounded-2xl flex items-center gap-2 active:scale-[0.98]"
          style={{backgroundColor:C.card}}>
          <Globe size={14} style={{color:C.secondary}}/>
          <div className="flex-1 text-left">
            <div style={{fontSize:10,color:C.secondary,fontWeight:500}}>對話主語言</div>
            <div className="flex items-center gap-1.5 mt-0.5">
              <span style={{fontSize:15}}>{SL?.flag}</span>
              <span style={{fontSize:13,fontWeight:600}}>{SL?.native}</span>
            </div>
          </div>
          <Down size={13} style={{color:C.tertiary}}/>
        </button>
        <button onClick={swap} className="shrink-0 w-9 h-9 rounded-full flex items-center justify-center active:scale-90"
          style={{color:C.secondary}}><LR size={16}/></button>
        <button onClick={()=>{setShowTgt(true);setShowSrc(false);}}
          className="flex-1 px-3 py-2.5 rounded-2xl flex items-center gap-2 active:scale-[0.98]"
          style={{backgroundColor:C.card}}>
          <Lang size={14} style={{color:C.secondary}}/>
          <div className="flex-1 text-left">
            <div style={{fontSize:10,color:C.secondary,fontWeight:500}}>翻譯語言</div>
            <div className="flex items-center gap-1.5 mt-0.5">
              <span style={{fontSize:15}}>{TL?.flag}</span>
              <span style={{fontSize:13,fontWeight:600}}>{TL?.native}</span>
            </div>
          </div>
          <Down size={13} style={{color:C.tertiary}}/>
        </button>
      </div>

      <nav className="flex items-center justify-around px-2 pt-2 pb-3 shrink-0"
        style={{borderTop:`1px solid ${C.border}`,backgroundColor:C.bg}}>
        {[{id:"voice",I:Mic,l:"語音"},{id:"text",I:Type,l:"文字"},{id:"image",I:ImgIcon,l:"圖片"},{id:"phrases",I:Bookmark,l:"短句"}]
          .map(({id,I,l})=>{const a=mode===id;return<button key={id} onClick={()=>setMode(id)}
            className="flex flex-col items-center gap-1 py-2 px-3 active:scale-90"
            style={{color:a?C.accent:C.tertiary}}>
            <I size={22} strokeWidth={a?2.2:1.6} fill={a?C.accent:"none"}/>
            <span style={{fontSize:10,fontWeight:a?600:500}}>{l}</span>
          </button>;})}
      </nav>
    </div>
    <Sheet show={showSrc} onClose={()=>setShowSrc(false)} subtitle="從" activeCode={src} onPick={setSrc}/>
    <Sheet show={showTgt} onClose={()=>setShowTgt(false)} subtitle="譯成" activeCode={tgt} onPick={setTgt} filter={l=>true}/>
  </>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
